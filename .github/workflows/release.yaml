name: Release
on:
  push:
    branches:
      - '**'
      - '!copilot/**'
      - '!dependabot/**'
    tags:
      - '**'
  pull_request:
concurrency:
  group: ${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true
jobs:
  source:
    name: Source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Prepare environment variables
        run: |
          PACKAGE_NAME="openarm-ker-firmware"
          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> "${GITHUB_ENV}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "VERSION=${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"
          else
            VERSION=$(grep FW_VERSION M5/include/Meta.h |
                        grep -E -o '[0-9]+\.[0-9]+\.[0-9]+')
            echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          fi
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            echo "REF=${GITHUB_SHA}" >> ${GITHUB_ENV}
          else
            echo "REF=${GITHUB_REF_NAME}" >> ${GITHUB_ENV}
          fi
      - name: Create source archive
        run: |
          mkdir -p dist
          name="${PACKAGE_NAME}-${VERSION}"
          git archive --format=tar ${REF} \
            --prefix "${name}/" \
            --output "dist/${name}.tar.gz"
          cd dist
          sha256sum \
            ${PACKAGE_NAME}-${VERSION}.tar.gz > \
            ${PACKAGE_NAME}-${VERSION}.tar.gz.sha256
          sha512sum \
            ${PACKAGE_NAME}-${VERSION}.tar.gz > \
            ${PACKAGE_NAME}-${VERSION}.tar.gz.sha512
      - uses: actions/upload-artifact@v7
        with:
          name: source
          path: |
            dist/${{ env.PACKAGE_NAME }}-${{ env.VERSION }}.tar.gz
            dist/${{ env.PACKAGE_NAME }}-${{ env.VERSION }}.tar.gz.sha256
            dist/${{ env.PACKAGE_NAME }}-${{ env.VERSION }}.tar.gz.sha512
  release:
    name: Release
    if: github.ref_type == 'tag'
    needs:
      - source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release
    permissions:
      contents: write
      discussions: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: source
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=${GITHUB_REF_NAME}
          gh release create ${version} \
            --discussion-category Announcements \
            --generate-notes \
            --repo ${GITHUB_REPOSITORY} \
            --title "OpenArm KER firmware ${version}" \
            --verify-tag \
            *.tar.gz*
