name: Build
on:
  push:
    branches:
      - '**'
      - '!copilot/**'
      - '!dependabot/**'
    tags:
      - '**'
  pull_request:
concurrency:
  group: ${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: 3
      - name: Install dependencies
        run: |
          pip install platformio
      - name: "Build: M5"
        run: |
          cd M5
          pio run
      - name: "Build: encoder"
        run: |
          cd encoder
          pio run
